  <style>
    :root{
      --blue:#1d4ed8;
      --blue-dark:#173ea8;
      --bg:#eef3fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#dbe3ef;
      --placeholder:#f5ead8;
      --shadow:0 10px 28px rgba(15,23,42,.08);
      --radius:16px;
      --radius-lg:20px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;background:var(--bg);color:var(--text);font-size:17px;padding-top:118px}
    .wrap{max-width:1460px;margin:0 auto;padding:20px}
    .header{position:fixed;top:0;left:0;right:0;width:100%;background:linear-gradient(180deg,#1d4ed8 0%, #1b46c2 100%);color:#fff;border-radius:0 0 16px 16px;box-shadow:var(--shadow);padding:18px 24px;z-index:900}
    .header-top{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;max-width:1380px;margin:0 auto}
    .title-area{display:flex;gap:16px;align-items:center}
    .icon{width:46px;height:46px;border-radius:16px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:22px;flex:0 0 auto}
    .title{font-size:30px;font-weight:800;letter-spacing:.04em;line-height:1.15}
    .subtitle{font-size:16px;color:#dbeafe;margin-top:6px}
    .header-actions{display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap}
    .btn{border:none;background:#cfdcf6;color:#17326f;padding:12px 16px;border-radius:14px;font-weight:800;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.06);font-size:15px}
    .btn.secondary{background:#d4def3;color:#17326f}
    .btn.blue{background:#1746b0;color:#fff}
    .btn.outline{background:#fff;border:1px solid #bfd3f8}
    .btn.small{padding:9px 12px;font-size:14px}
    .tabs{display:flex;gap:12px;margin-top:12px}
    .tab{flex:1;padding:16px 22px;border-radius:16px;background:#d7e3fb;border:1px solid #b9caef;cursor:pointer;font-weight:800;color:#173569;font-size:18px;min-width:0}
    .tab.active{background:#1d4ed8;color:#fff;border-color:#1d4ed8;box-shadow:0 10px 20px rgba(29,78,216,.18)}
    .section{background:linear-gradient(180deg,#f6f9ff 0%, #ffffff 100%);border:1px solid #d6e2f5;border-radius:20px;box-shadow:var(--shadow);padding:22px;margin-top:18px}
    .section-header{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:14px}
    .section-title{font-size:24px;font-weight:800}
    .section-desc{font-size:15px;color:var(--muted);margin-top:5px}
    .mode-switch{display:flex;gap:10px;flex-wrap:wrap}
    .mode-switch .btn.active{background:linear-gradient(180deg,#1d4ed8 0%,#1842b8 100%);color:#fff;box-shadow:0 12px 22px rgba(29,78,216,.28);border:1px solid #1b46c2}
    .mode-switch .btn:not(.active){background:#b7c9ee;color:#14366f;border:1px solid #9fb6e6}
    .grid{display:grid;gap:14px}
    .grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .field label{display:flex;justify-content:space-between;gap:10px;align-items:center;font-size:16px;font-weight:800;color:#334155;margin-bottom:8px}
    input,select,textarea{width:100%;border:1px solid #cdd9ea;border-radius:14px;padding:13px 14px;font-size:16px;background:#fff;color:#0f172a;outline:none}

  <div id="toast" class="toast"></div>

        <div class="summary" id="summaryArea"></div>
      </div>
    </div>

    <div id="masterTab" class="hidden">
      <div class="section master-supplier-section">
        <div class="section-header">
          <div class="section-title-wrap">
            <div class="section-title" style="font-size:20px">仕入先マスタ</div>
          </div>
          <div class="table-actions"><button class="btn blue" style="font-size:17px;padding:14px 22px;min-width:164px" onclick="addSupplier()">仕入先追加</button><button class="btn blue" onclick="saveSupplierMasters()">保存</button></div>
        </div>
        <div id="supplierMaster"></div>
      </div>

      <div class="section master-ocean-section">
        <div class="section-header">
          <div class="section-title-wrap">
            <div class="section-title" style="font-size:20px">海上運賃マスタ</div>
          </div>
          <div class="table-actions"><button class="btn blue" style="font-size:17px;padding:14px 18px;min-width:184px" onclick="addOceanFreight()">運賃追加</button><button class="btn blue" onclick="saveOceanFreightMasters()">保存</button></div>
        </div>
        <div class="scroll-x">
          <table style="min-width:1280px">
            <thead>
              <tr>
                <th>積港</th><th>揚港</th><th>海上運賃</th><th>通貨</th><th>EBS（USD）</th><th>船会社名</th><th>備考</th><th></th>
              </tr>
            </thead>
            <tbody id="oceanFreightBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

<script>
const STORAGE_KEYS = {
  suppliers: 'wastepaper.suppliers.v1',
  oceanFreight: 'wastepaper.oceanfreight.v1',
  quotes: 'wastepaper.savedquotes.v1'
};

const LC_FEES = {
  'L/C(90)': 1.5,
  'L/C(60)': 1.0,
  'L/C(30)': 0.75,
  'L/C(at sight)': 0.5,
  'T/T': 0.25
};

const PRODUCT_DEFAULT_LOAD = {
  'OCC':22,
  '雑誌':23,
  '新聞':22,
  '残紙':22,
  'シュレッダー':21,
  '紙管':20,
  'SOP':22,
  '金属合紙':20
};
const PRODUCTS = Object.keys(PRODUCT_DEFAULT_LOAD);
const COM_OPTIONS = Array.from({length:15}, (_,i)=>(4 - i*0.25).toFixed(2));

function createQuoteLine(condition='CY渡し'){
  return {id:uid(), product:'', yardName:'', quoteCondition:'', price:'', quantity:'', note:''};
}
function createDefaultQuoteLines(condition='CY渡し'){
  return [createQuoteLine(condition), createQuoteLine(condition)];
}

function uid(){ return Math.random().toString(36).slice(2) + Date.now().toString(36); }
function toHalfWidthNumericText(v){
  return String(v ?? '')
    .replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
    .replace(/．|。/g,'.')
    .replace(/，|、/g,',')
    .replace(/－|ー|―|‐/g,'-')
    .replace(/／/g,'/');
}
function normalizeNumericLikeValue(v){ return toHalfWidthNumericText(v).replace(/,/g,''); }
function n(v){ const cleaned = normalizeNumericLikeValue(v).replace(/[^0-9.\-]/g,''); const x = Number(cleaned); return Number.isFinite(x) ? x : 0; }
function fmt(v,d=2){ return Number.isFinite(v) ? v.toFixed(d) : ''; }
function formatQuotePriceDisplay(v){ const num=n(v); return Number.isFinite(num) ? (Math.round(num*10)/10).toFixed(2) : ''; }
function jp(v,d=0){ return Number.isFinite(Number(v)) ? new Intl.NumberFormat('ja-JP',{minimumFractionDigits:d, maximumFractionDigits:d}).format(Number(v)) : ''; }
function formatMoneyDisplay(v,currency,d=0){ const num=n(v); if(!num && String(v ?? '').trim()==='') return ''; return currency==='USD' ? `$${jp(num,d)}` : `¥${jp(num,d)}`; }
function parseNumericInput(v){ return normalizeNumericLikeValue(v).replace(/[^0-9.\-]/g,''); }
function shouldNormalizeCurrencyInput(el){
  if(!el || el.tagName !== 'INPUT') return false;
  const ids = ['sellingPrice','fxRate','lcFee','overseasCom','marginUsd','ofValue','ebs','doFee','customsFee','handlingFee','marginJpyKg'];
  if(ids.includes(el.id)) return true;
  if(el.classList.contains('money-input') || el.classList.contains('master-money') || el.classList.contains('quote-price')) return true;
  return false;
}
function normalizeCurrencyInputElement(el){
  if(!shouldNormalizeCurrencyInput(el)) return;
  const before = String(el.value ?? '');
  const after = toHalfWidthNumericText(before);
  if(before !== after){
    const pos = el.selectionStart ?? after.length;
    const delta = before.length - after.length;
    el.value = after;
    try{ el.setSelectionRange(Math.max(0,pos-delta), Math.max(0,pos-delta)); }catch(e){}
  }
}

function stripMasterMoneyForEdit(el){
  if(!el || !el.classList || !el.classList.contains('master-money')) return;
  el.value = parseNumericInput(el.value);
}
function formatMasterMoneyByDataset(el){
  if(!el || !el.classList || !el.classList.contains('master-money')) return;
  const raw = parseNumericInput(el.value);
  if(raw === ''){ el.value = ''; return; }
  const kind = el.dataset.moneyFormat || '';
  if(kind === 'yen'){
    el.value = formatYenDisplay(raw);
    return;
  }
  if(kind === 'usd'){
    el.value = formatDollarDisplay(raw);
    return;
  }
  if(kind === 'ocean'){
    const currency = el.dataset.currency || 'USD';
    el.value = formatOceanFreightDisplay(raw, currency);
    return;
  }
}
function formatYenDisplay(v){ const raw = String(v ?? '').trim(); if(raw==='') return ''; return `¥${jp(n(raw),0)}`; }
function formatDollarDisplay(v){ const raw = String(v ?? '').trim(); if(raw==='') return ''; return `$${jp(n(raw),0)}`; }
function formatUsdTonDisplay(v,d=1){ const raw = String(v ?? '').trim(); if(raw==='') return ''; return `$${n(raw).toFixed(d)} /ton`; }
function isMobileView(){ return window.innerWidth <= 760; }
function formatOceanFreightDisplay(v,currency){ return currency==='JPY' ? formatYenDisplay(v) : formatDollarDisplay(v); }
function syncMatchedOceanFreight(){ const matched = state.oceanFreight.find(x => x.loadingPort===state.basic.loadingPort && x.dischargePort===state.basic.dischargePort); if(matched){ state.exportCosts.ofValue = matched.ofValue; state.exportCosts.ofCurrency = matched.ofCurrency; state.exportCosts.ebs = matched.ebs; }}
function saveLocal(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
function loadLocal(k,fallback){ try{ const v = localStorage.getItem(k); return v ? JSON.parse(v) : fallback; }catch(e){ return fallback; } }
function toast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(window.__toastTimer); window.__toastTimer=setTimeout(()=>el.classList.remove('show'),1000); }
function clearValidationErrors(){ document.querySelectorAll('.input-error').forEach(el=>el.classList.remove('input-error')); }
function markInvalid(el){
  if(!el) return;
  el.classList.add('input-error');
}
function scrollToInvalid(el){
  if(!el) return;
  const header = document.querySelector('.app-header');
  const offset = header ? header.offsetHeight + 16 : 16;
  const rect = el.getBoundingClientRect();
  const top = window.pageYOffset + rect.top - offset;
  window.scrollTo({top: Math.max(0, top), behavior:'smooth'});
  try{ el.focus({preventScroll:true}); }catch(e){}
}
function markAndScrollInvalid(el){
  markInvalid(el);
  scrollToInvalid(el);
}
document.addEventListener('input', e => {
  const t = e.target;
  if(!t || !t.classList) return;
  normalizeCurrencyInputElement(t);
  if(t.classList.contains('input-error')) t.classList.remove('input-error');
  if('value' in t) t.classList.toggle('blank', String(t.value ?? '').trim() === '');
});

document.addEventListener('focusin', e => {
  const t = e.target;
  if(!t || !t.classList) return;
  stripMasterMoneyForEdit(t);
});
document.addEventListener('focusout', e => {
  const t = e.target;
  if(!t || !t.classList) return;
  formatMasterMoneyByDataset(t);
});
document.addEventListener('change', e => {
  const t = e.target;
  if(!t || !t.classList) return;
  if(t.classList.contains('input-error')) t.classList.remove('input-error');
  if('value' in t) t.classList.toggle('blank', String(t.value ?? '').trim() === '');
});

let state = {
  activeTab:'estimate',
  calcMode:'overseas',
  suppliers: loadLocal(STORAGE_KEYS.suppliers, [
    {id:uid(), shortName:'新井商店', formalName:'株式会社新井商店', contact:'山田 太郎 / 部長', phone:'03-0000-0000', yards:[{id:uid(), name:'成田', drayage:45000},{id:uid(), name:'千葉', drayage:42000}]},
    {id:uid(), shortName:'丸和', formalName:'丸和商事株式会社', contact:'佐藤 一郎 / 課長', phone:'06-0000-0000', yards:[{id:uid(), name:'東京', drayage:38000}]}
  ]),
  oceanFreight: loadLocal(STORAGE_KEYS.oceanFreight, [
    {id:uid(), loadingPort:'TOKYO', dischargePort:'TAICHUNG', ofValue:200, ofCurrency:'USD', ebs:100, carrier:'', note:''},
    {id:uid(), loadingPort:'TOKYO', dischargePort:'HAIPHONG', ofValue:400, ofCurrency:'USD', ebs:120, carrier:'', note:''},
    {id:uid(), loadingPort:'YOKOHAMA', dischargePort:'KAOHSIUNG', ofValue:48000, ofCurrency:'JPY', ebs:90, carrier:'', note:''}
  ]),
  savedQuotes: loadLocal(STORAGE_KEYS.quotes, []),
  basic: {
    supplierShortName:'', salesCondition:'CIF', sellingPrice:'', shipmentLot:200,
    paymentTerm:'T/T', loadingPort:'', dischargePort:'', fxRate:''
  },
  overseasCosts:{ lcFee:0.25, overseasCom:0.5, margin:4 },
  exportCosts:{ insurance:0, ofValue:'', ofCurrency:'USD', ebs:'', doFee:7980, customsFee:5900, handlingFee:15000 },
  domesticCosts:{ marginJpyKg:0.5 },
  quoteLines:createDefaultQuoteLines('CY渡し'),
  bottomNote:''
};
state.oceanFreight = state.oceanFreight.map(r => ({...r, carrier:(r.carrier || r.shippingLine || ''), note:(r.note || '')}));

function persistMasters(){
  saveLocal(STORAGE_KEYS.suppliers, state.suppliers);
  saveLocal(STORAGE_KEYS.oceanFreight, state.oceanFreight);
  saveLocal(STORAGE_KEYS.quotes, state.savedQuotes);
}

function selectedSupplier(){ return state.suppliers.find(s => s.shortName === state.basic.supplierShortName) || null; }
function availableYards(){ return selectedSupplier()?.yards || []; }

function switchTab(tab){
  state.activeTab = tab;
  document.getElementById('tabEstimate').classList.toggle('active', tab==='estimate');
  document.getElementById('tabMaster').classList.toggle('active', tab==='master');
  document.getElementById('estimateTab').classList.toggle('hidden', tab!=='estimate');
  document.getElementById('masterTab').classList.toggle('hidden', tab!=='master');
  renderAll();
}

function setCalcMode(mode){
  state.calcMode = mode;
  document.getElementById('modeOverseas').classList.toggle('active', mode==='overseas');
  document.getElementById('modeCy').classList.toggle('active', mode==='cy');
  state.basic.sellingPrice = '';
  if(mode==='cy'){
    state.basic.salesCondition = 'CY渡し';
    state.quoteLines = state.quoteLines.map(x => ({...x, quoteCondition:'店頭'}));
  } else {
    if(state.basic.salesCondition === 'CY渡し') state.basic.salesCondition = 'CIF';
    state.quoteLines = state.quoteLines.map(x => ({...x, quoteCondition:'CY渡し'}));
  }
  renderAll();
  recalcAll();
}

function renderSelectOptions(el, items, placeholder, current){
  let html = `<option value="">${placeholder}</option>`;
  for(const item of items){ html += `<option value="${escapeHtml(item)}" ${current===item?'selected':''}>${escapeHtml(item)}</option>`; }
  el.innerHTML = html;
}

function escapeHtml(s){ return String(s ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function renderBasics(){
  renderSelectOptions(document.getElementById('supplierShortName'), state.suppliers.map(s=>s.shortName).filter(Boolean), '仕入先を選択', state.basic.supplierShortName);

  const sales = document.getElementById('salesCondition');
  if(state.calcMode==='overseas'){
    sales.innerHTML = `<option value="CIF" ${state.basic.salesCondition==='CIF'?'selected':''}>CIF</option><option value="CFR" ${state.basic.salesCondition==='CFR'?'selected':''}>CFR</option>`;
    sales.disabled = false;
  }else{
    sales.innerHTML = `<option value="CY渡し">CY渡し</option>`;
    sales.disabled = true;
  }

  document.getElementById('sellingPrice').value = state.basic.sellingPrice;
  document.getElementById('shipmentLot').value = state.basic.shipmentLot;
  document.getElementById('sellingUnit').textContent = state.calcMode==='overseas' ? 'USD/ton' : '円/kg';
  document.getElementById('sellingPrice').placeholder = state.calcMode==='overseas' ? '例）160' : '例）19.3';

  const payment = document.getElementById('paymentTerm');
  payment.innerHTML = Object.keys(LC_FEES).map(k=>`<option value="${k}" ${state.basic.paymentTerm===k?'selected':''}>${k}</option>`).join('');

  const lps = [...new Set(state.oceanFreight.map(x=>x.loadingPort).filter(Boolean))];
  const dps = [...new Set(state.oceanFreight.map(x=>x.dischargePort).filter(Boolean))];
  renderSelectOptions(document.getElementById('loadingPort'), lps, '積港を選択', state.basic.loadingPort);
  renderSelectOptions(document.getElementById('dischargePort'), dps, '揚港を選択', state.basic.dischargePort);
  document.getElementById('fxRate').value = state.basic.fxRate;
  document.getElementById('fxRate').style.textAlign = 'center';

  document.querySelectorAll('.overseas-only').forEach(el => el.classList.toggle('hidden', state.calcMode !== 'overseas'));
  document.querySelectorAll('.cy-only').forEach(el => el.classList.toggle('hidden', state.calcMode !== 'cy'));
  document.querySelectorAll('.cif-only').forEach(el => el.classList.toggle('hidden', !(state.calcMode==='overseas' && state.basic.salesCondition==='CIF')));

  document.getElementById('lcFee').value = formatUsdTonDisplay(state.overseasCosts.lcFee, 2);
  document.getElementById('overseasCom').value = formatUsdTonDisplay(state.overseasCosts.overseasCom, 1);
  document.getElementById('marginUsd').value = formatUsdTonDisplay(state.overseasCosts.margin, 1);
  document.getElementById('insurance').value = formatMoneyDisplay(state.exportCosts.insurance, 'USD', 2);
  document.getElementById('ofValue').value = formatMoneyDisplay(state.exportCosts.ofValue, state.exportCosts.ofCurrency);
  const ofCurrencyEl = document.getElementById('ofCurrency');
  if(ofCurrencyEl) ofCurrencyEl.value = state.exportCosts.ofCurrency;
  document.getElementById('ebs').value = formatMoneyDisplay(state.exportCosts.ebs, 'USD');
  document.getElementById('doFee').value = formatMoneyDisplay(state.exportCosts.doFee, 'JPY');
  document.getElementById('customsFee').value = formatMoneyDisplay(state.exportCosts.customsFee, 'JPY');
  document.getElementById('handlingFee').value = formatMoneyDisplay(state.exportCosts.handlingFee, 'JPY');
  document.getElementById('marginJpyKg').value = fmt(n(state.domesticCosts.marginJpyKg),1);

  const inputs = ['sellingPrice','shipmentLot','fxRate','lcFee','marginUsd','insurance','ofValue','ebs','doFee','customsFee','handlingFee','marginJpyKg'];
  inputs.forEach(id=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.classList.toggle('blank', !el.value && el.value !== 0);
  });
  ['supplierShortName','salesCondition','paymentTerm','loadingPort','dischargePort'].forEach(id=>{
    const el = document.getElementById(id);
    if(!el) return;
    el.classList.toggle('blank', !el.value);
  });
}

function onBasicChange(){
  state.basic.supplierShortName = document.getElementById('supplierShortName').value;
  state.basic.salesCondition = document.getElementById('salesCondition').value;
  state.basic.sellingPrice = document.getElementById('sellingPrice').value;
  state.basic.shipmentLot = document.getElementById('shipmentLot').value;
  syncMatchedOceanFreight();
  renderAll();
  recalcAll();
}
function onPaymentTermChange(){
  state.basic.paymentTerm = document.getElementById('paymentTerm').value;
  state.overseasCosts.lcFee = LC_FEES[state.basic.paymentTerm] ?? 0.25;
  renderBasics();
  recalcAll();
}
function onPortChange(){
  state.basic.loadingPort = document.getElementById('loadingPort').value;
  state.basic.dischargePort = document.getElementById('dischargePort').value;
  syncMatchedOceanFreight();
  renderBasics();
  recalcAll();
}

function currentShippingCosts(){
  const quantity = n(state.quoteLines[0]?.quantity || 22) || 22;
  const shipmentLot = n(state.basic.shipmentLot) || 1;
  const ofValue = n(state.exportCosts.ofValue);
  const ebs = n(state.exportCosts.ebs);
  const fx = n(state.basic.fxRate);
  const ofUsdPerTon = state.exportCosts.ofCurrency === 'JPY' ? (fx ? ofValue / fx / quantity : 0) : ofValue / quantity;
  const ebsUsdPerTon = ebs / quantity;
  const doAndHandlingJpyPerTon = (n(state.exportCosts.customsFee) + n(state.exportCosts.handlingFee)) / shipmentLot;
  return {quantity, ofUsdPerTon, ebsUsdPerTon, doAndHandlingJpyPerTon};
}

function currentCyBase(){
  if(state.calcMode !== 'overseas') return null;
  const sell = n(state.basic.sellingPrice);
  const fx = n(state.basic.fxRate);
  if(!sell || !fx) return null;
  const lc = n(state.overseasCosts.lcFee);
  const com = n(state.overseasCosts.overseasCom);
  const margin = n(state.overseasCosts.margin);
  const insurance = n(state.exportCosts.insurance);
  const ship = currentShippingCosts();
  const fobUsdTon = state.basic.salesCondition === 'CIF'
    ? sell - lc - com - margin - insurance - ship.ofUsdPerTon - ship.ebsUsdPerTon
    : sell - com - margin - ship.ofUsdPerTon - ship.ebsUsdPerTon;
  const fobJpyTon = fobUsdTon * fx;
  const cyJpyTon = fobJpyTon - ship.doAndHandlingJpyPerTon;
  return {fobUsdTon, fobJpyTon, cyJpyKg: cyJpyTon / 1000};
}

function drayagePerKg(yardName, qty){
  const yard = availableYards().find(y => y.name === yardName);
  const d = n(yard?.drayage);
  return d ? d / (n(qty)||1) / 1000 : 0;
}

function renderDrayageSummaryCards(){
  const storefrontLines = state.quoteLines
    .map((line, idx) => ({line, idx, dray: drayagePerKg(line.yardName, line.quantity)}))
    .filter(item => item.line.quoteCondition === '店頭' && item.line.yardName);
  if(!storefrontLines.length) return '';
  const details = storefrontLines.map(item => `商品/ヤード：${escapeHtml(item.line.product || `L${item.idx + 1}`)}/${escapeHtml(item.line.yardName || '')} ドレー単価：${fmt(item.dray,2)} 円/kg`).join('<br>');
  return `<div class="summary-card" style="grid-column: span 2;"><div class="summary-label">ドレー費 kg単価</div><div class="mini-value" style="font-size:16px;font-weight:700;line-height:1.8">${details}</div></div>`;
}

function linePrice(line){
  const qty = n(line.quantity)||1;
  const dray = drayagePerKg(line.yardName, qty);
  if(state.calcMode === 'cy'){
    const base = n(state.basic.sellingPrice) - n(state.domesticCosts.marginJpyKg);
    return line.quoteCondition === '店頭' ? base - dray : base;
  }
  const cy = currentCyBase();
  const base = n(cy?.cyJpyKg);
  return line.quoteCondition === '店頭' ? base - dray : base;
}

function renderYardCards(){
  const box = document.getElementById('yardCards');
  const yards = availableYards();
  if(!yards.length){ box.innerHTML = `<div class="mini-card muted">見積先を選択するとヤード情報が表示されます</div>`; return; }
  box.innerHTML = yards.map(y => `<div class="mini-card"><div class="mini-title">${escapeHtml(state.basic.supplierShortName || '仕入先未選択')}　${escapeHtml(y.name)}</div><div class="mini-value">${jp(y.drayage,0)}円/車</div></div>`).join('');
}

function renderQuoteTable(){
  const body = document.getElementById('quoteTableBody');
  const yards = availableYards();
  body.innerHTML = state.quoteLines.map((line, idx) => {
    const price = formatQuotePriceDisplay(linePrice(line));
    const productOptions = `<option value="">商品選択</option>` + PRODUCTS.map(p => `<option value="${p}" ${line.product===p?'selected':''}>${p}</option>`).join('');
    const yardOptions = `<option value="">ヤード選択</option>` + yards.map(y => `<option value="${escapeHtml(y.name)}" ${line.yardName===y.name?'selected':''}>${escapeHtml(y.name)}</option>`).join('');
    const conditionOptions = state.calcMode === 'cy'
      ? `<option value="">見積条件選択</option><option value="店頭" ${line.quoteCondition==='店頭'?'selected':''}>店頭</option>`
      : `<option value="">見積条件選択</option><option value="CY渡し" ${line.quoteCondition==='CY渡し'?'selected':''}>CY渡し</option><option value="店頭" ${line.quoteCondition==='店頭'?'selected':''}>店頭</option>`;
    const productBlank = !String(line.product ?? '').trim();
    const yardBlank = !String(line.yardName ?? '').trim();
    const conditionBlank = !String(line.quoteCondition ?? '').trim();
    const qtyBlank = !String(line.quantity ?? '').trim();
    return `<tr data-line-id="${line.id}">
      <td><select data-field="product" class="${productBlank?'blank':''}" onchange="updateQuoteLine('${line.id}','product',this.value)">${productOptions}</select></td>
      <td><select data-field="yardName" class="${yardBlank?'blank':''}" onchange="updateQuoteLine('${line.id}','yardName',this.value)">${yardOptions}</select></td>
      <td><select data-field="quoteCondition" class="${conditionBlank?'blank':''}" onchange="updateQuoteLine('${line.id}','quoteCondition',this.value)">${conditionOptions}</select></td>
      <td><input value="${price}" readonly style="text-align:center;font-weight:700" /></td>
      <td><input data-field="quantity" class="quote-qty ${qtyBlank?'blank':''}" value="${line.quantity==='' ? "" : fmt(n(line.quantity),1)}" placeholder="例）22.0" oninput="updateQuoteLine('${line.id}','quantity',this.value)" /></td>
      <td><input value="${escapeHtml(line.note)}" class="${!line.note?'blank':''}" placeholder="例）ベトナム向け" oninput="updateQuoteLine('${line.id}','note',this.value)" /></td>
      <td>${idx===0 ? '' : `<button class="btn small delete-btn icon-only" title="削除" onclick="removeQuoteLine('${line.id}')">&times;</button>`}</td>
    </tr>`;
  }).join('');
}

function renderSummary(){
  const box = document.getElementById('summaryArea');
  if(state.calcMode === 'overseas'){
    const cy = currentCyBase();
    const ship = currentShippingCosts();
    box.innerHTML = `
      <div class="summary-card"><div class="summary-label">海上運賃換算（USD/ton）</div><div class="summary-value">${fmt(ship.ofUsdPerTon,2)}</div></div>
      <div class="summary-card"><div class="summary-label">FOB価格（USD/ton）</div><div class="summary-value">${cy ? fmt(cy.fobUsdTon,2) : '-'}</div></div>
      <div class="summary-card"><div class="summary-label">FOB価格（円/ton）</div><div class="summary-value">${cy ? jp(cy.fobJpyTon,0) : '-'}</div></div>
      <div class="summary-card"><div class="summary-label">CY価格ベース（円/kg）</div><div class="summary-value" style="color:#1d4ed8">${cy ? fmt(cy.cyJpyKg,2) : '-'}</div></div>
      ${renderDrayageSummaryCards()}
    `;
  }else{
    box.innerHTML = `

function toggleYardCard(btn){
  if(window.innerWidth > 760) return;
  const item = btn.closest('.yard-item');
  if(!item) return;
  item.classList.toggle('is-collapsed');
  btn.textContent = item.classList.contains('is-collapsed') ? '▸' : '▾';
}

function syncYardCardTitle(input){ return; }

function renderSavedList(){
  const select = document.getElementById('savedQuoteSelect');
  if(!select) return;
  if(!state.savedQuotes.length){
    select.innerHTML = '<option value="">保存データはまだありません</option>';
    return;
  }
  select.innerHTML = '<option value="">保存データを選択</option>' + state.savedQuotes.map(item =>
    `<option value="${item.id}">${escapeHtml(item.key)} / ${item.calcMode==='overseas'?'海外売価逆算':'CY価格逆算'} / ${escapeHtml(item.basic.salesCondition || '')}</option>`
  ).join('');
}

function renderAll(){
  renderBasics();
  renderYardCards();
  renderQuoteTable();
  renderSummary();
  renderSupplierMaster();
  renderOceanFreight();
  renderSavedList();
  document.getElementById('bottomNote').value = state.bottomNote || '';
  document.getElementById('bottomNote').classList.toggle('blank', !state.bottomNote);

  const cy = currentCyBase();
  document.getElementById('cyBaseBadge').textContent = `見積価格　CY価格 ${cy ? fmt(cy.cyJpyKg,2) : '0.00'}円/kg ベース`;
  const domesticDescEl = document.getElementById('domesticDesc'); if(domesticDescEl){ domesticDescEl.textContent = state.calcMode==='cy' ? 'CY価格逆算の計算条件' : '店頭条件計算時にドレー費を参照'; }
}

function recalcAll(){
  state.basic.fxRate = document.getElementById('fxRate')?.value ?? state.basic.fxRate;
  state.overseasCosts.lcFee = document.getElementById('lcFee')?.value ?? state.overseasCosts.lcFee;
  state.overseasCosts.overseasCom = document.getElementById('overseasCom')?.value ?? state.overseasCosts.overseasCom;
  state.overseasCosts.margin = document.getElementById('marginUsd')?.value ?? state.overseasCosts.margin;
  state.exportCosts.ofValue = document.getElementById('ofValue')?.value ?? state.exportCosts.ofValue;
  state.exportCosts.ofCurrency = document.getElementById('ofCurrency')?.value ?? state.exportCosts.ofCurrency;
  state.exportCosts.ebs = document.getElementById('ebs')?.value ?? state.exportCosts.ebs;
  state.exportCosts.doFee = document.getElementById('doFee')?.value ?? state.exportCosts.doFee;
  state.exportCosts.customsFee = document.getElementById('customsFee')?.value ?? state.exportCosts.customsFee;
  state.exportCosts.handlingFee = document.getElementById('handlingFee')?.value ?? state.exportCosts.handlingFee;
  state.domesticCosts.marginJpyKg = document.getElementById('marginJpyKg')?.value ?? state.domesticCosts.marginJpyKg;

  if(state.calcMode === 'overseas' && state.basic.salesCondition === 'CIF'){
    state.exportCosts.insurance = n(state.basic.sellingPrice) * 0.0011;
  } else {
    state.exportCosts.insurance = 0;
  }
  renderAll();
}

function spinLcFee(delta){
  state.overseasCosts.lcFee = fmt(Math.max(0, n(state.overseasCosts.lcFee)+delta),2);
  renderBasics();
  recalcAll();
}

function spinOverseasCom(delta){
  state.overseasCosts.overseasCom = fmt(Math.max(0, n(state.overseasCosts.overseasCom)+delta),2);
  renderBasics();
  recalcAll();
}

function spinMargin(delta){
  state.overseasCosts.margin = fmt(Math.max(0, n(state.overseasCosts.margin)+delta),2);
  renderBasics();
  recalcAll();
}

function spinMarginJpyKg(delta){
  state.domesticCosts.marginJpyKg = fmt(Math.max(0, n(state.domesticCosts.marginJpyKg)+delta),1);
  renderBasics();
  recalcAll();
}

function fetchFx(){
  const mockMid = 159.20;
  const adjusted = mockMid - 0.5;
  state.basic.fxRate = adjusted.toFixed(2);
  clearValidationErrors();
  renderBasics();
  recalcAll();
  const fxEl = document.getElementById('fxRate');
  if(fxEl) fxEl.classList.remove('input-error');
  toast('為替を取得しました');
}

function addQuoteLine(){
  clearValidationErrors();
  state.quoteLines.push(createQuoteLine(''));
  renderAll();
}
function removeQuoteLine(id){
  const idx = state.quoteLines.findIndex(x => x.id === id);
  if(idx <= 0) return toast('1行目は削除できません');
  state.quoteLines = state.quoteLines.filter(x => x.id !== id);
  renderAll();
}
function updateQuoteLine(id,key,val){
  state.quoteLines = state.quoteLines.map(line => {
    if(line.id !== id) return line;
    const next = {...line, [key]:val};
    if(key === 'product'){
      next.quantity = val ? fmt(n(PRODUCT_DEFAULT_LOAD[val]),1) : '';
    }
    if(key === 'yardName'){
      if(String(val || '').trim()) next.quoteCondition = '店頭';
    }
    if(key === 'quoteCondition' && val !== '店頭'){
      next.yardName = '';
    }
    return next;
  });
  renderAll();
}

function saveQuote(){
  if(!state.basic.supplierShortName) return toast('見積先を選択してください');
  state.bottomNote = document.getElementById('bottomNote').value;
  const d = new Date();
  const key = `${state.basic.supplierShortName} ${d.getFullYear()}.${d.getMonth()+1}.${d.getDate()}`;
  const payload = JSON.parse(JSON.stringify({
    id:uid(), key, savedAt:d.toISOString(), calcMode:state.calcMode, basic:state.basic,
    overseasCosts:state.overseasCosts, exportCosts:state.exportCosts, domesticCosts:state.domesticCosts,
    quoteLines:state.quoteLines, bottomNote:state.bottomNote
  }));
  const idx = state.savedQuotes.findIndex(x => x.key === key);
  if(idx >= 0) state.savedQuotes[idx] = payload; else state.savedQuotes.unshift(payload);
  saveLocal(STORAGE_KEYS.quotes, state.savedQuotes);
  renderSavedList();
  toast('入力内容を保存しました');
}
function openSavedModal(){ renderSavedList(); document.getElementById('savedModal').classList.add('show'); }
function closeSavedModal(){ document.getElementById('savedModal').classList.remove('show'); }
function loadSelectedQuote(){
  const id = document.getElementById('savedQuoteSelect')?.value;
  if(!id) return toast('保存データを選択してください');
  loadQuote(id);
}
function deleteSelectedQuote(){
  const id = document.getElementById('savedQuoteSelect')?.value;
  if(!id) return toast('保存データを選択してください');
  state.savedQuotes = state.savedQuotes.filter(x => x.id !== id);
  saveLocal(STORAGE_KEYS.quotes, state.savedQuotes);
  renderSavedList();
  toast('保存データを削除しました');
}
function loadQuote(id){
  const item = state.savedQuotes.find(x => x.id === id);
  if(!item) return;
  state.calcMode = item.calcMode || 'overseas';
  state.basic = item.basic;
  state.overseasCosts = item.overseasCosts;
  state.exportCosts = item.exportCosts;
  state.domesticCosts = item.domesticCosts || {marginJpyKg:0.5};
  state.quoteLines = item.quoteLines?.length ? item.quoteLines : createDefaultQuoteLines(state.calcMode==='cy'?'店頭':'CY渡し');
  state.bottomNote = item.bottomNote || '';
  closeSavedModal();
  switchTab('estimate');
  document.getElementById('modeOverseas').classList.toggle('active', state.calcMode==='overseas');
  document.getElementById('modeCy').classList.toggle('active', state.calcMode==='cy');
  renderAll();
  recalcAll();
  toast('保存データを読み込みました');
}
function resetForm(){
  state.basic = { supplierShortName:'', salesCondition:state.calcMode==='overseas'?'CIF':'CY渡し', sellingPrice:'', shipmentLot:200, paymentTerm:'T/T', loadingPort:'', dischargePort:'', fxRate:'' };
  state.overseasCosts = { lcFee:0.25, overseasCom:0.5, margin:4 };
  state.exportCosts = { insurance:0, ofValue:'', ofCurrency:'USD', ebs:'', doFee:7980, customsFee:5900, handlingFee:15000 };
  state.domesticCosts = { marginJpyKg:0.5 };
  state.quoteLines = createDefaultQuoteLines(state.calcMode==='cy'?'店頭':'CY渡し');
  state.bottomNote = '';
  renderAll();
  toast('入力内容をリセットしました');
}

function isBlank(value){ return String(value ?? '').trim() === ''; }
function validateSupplierMasters(){
  for(const s of state.suppliers){
    if(isBlank(s.shortName) || isBlank(s.formalName) || isBlank(s.contact) || isBlank(s.phone)){
      return '仕入先マスタは全項目入力必須です';
    }
    if(!Array.isArray(s.yards) || !s.yards.length) return '仕入先マスタはヤードを1件以上登録してください';
    for(const y of s.yards){
      if(isBlank(y.name) || isBlank(y.drayage)) return '仕入先マスタはヤード名・ドレー運賃を含め全項目入力必須です';
    }
  }
  return '';
}
function validateOceanFreightMasters(){
  for(const r of state.oceanFreight){
    if(isBlank(r.loadingPort) || isBlank(r.dischargePort) || isBlank(r.ofValue) || isBlank(r.ofCurrency) || isBlank(r.carrier)){
      return '海上運賃マスタは積港・揚港・海上運賃・通貨・船会社名が入力必須です';
    }
  }
  return '';
}
function saveMasters(){
  const supplierError = validateSupplierMasters();
  if(supplierError) return toast(supplierError);
  const oceanError = validateOceanFreightMasters();
  if(oceanError) return toast(oceanError);
  renderAll();
  persistMasters();
  toast('マスタを保存しました');
}
function saveSupplierMasters(){
  const error = validateSupplierMasters();
  if(error) return toast(error);
  renderAll();
  persistMasters();
  toast('仕入先マスタを保存しました');
}
function saveOceanFreightMasters(){
  const error = validateOceanFreightMasters();
  if(error) return toast(error);
  renderAll();
  persistMasters();
  toast('海上運賃マスタを保存しました');
}
function validateIssueQuote(){
  clearValidationErrors();
  const basicRequired = [
    ['見積先', state.basic.supplierShortName, 'supplierShortName'],
    ['販売条件', state.basic.salesCondition, 'salesCondition'],
    ['販売単価', state.basic.sellingPrice, 'sellingPrice'],
    ['船積みロット', state.basic.shipmentLot, 'shipmentLot'],
    ['決済条件', state.basic.paymentTerm, 'paymentTerm'],
    ['積港', state.basic.loadingPort, 'loadingPort'],
    ['揚港', state.basic.dischargePort, 'dischargePort'],
    ['為替', state.basic.fxRate, 'fxRate']
  ];
  for(const [label,val,id] of basicRequired){
    if(isBlank(val)){
      const el = document.getElementById(id);
      markAndScrollInvalid(el);
      return `見積書発行前に${label}を入力してください`;
    }
  }
  if(!state.quoteLines.length) return '見積条件を1行以上入力してください';
  const body = document.getElementById('quoteTableBody');
  for(let i=0;i<state.quoteLines.length;i++){
    const line = state.quoteLines[i];
    const row = body?.querySelector(`tr[data-line-id="${line.id}"]`);
    const required = [
      ['商品', line.product, 'product'],
      ['見積条件', line.quoteCondition, 'quoteCondition'],
      ['積載', line.quantity, 'quantity']
    ];
    if(line.quoteCondition === '店頭'){
      required.splice(1, 0, ['ヤード名', line.yardName, 'yardName']);
    }
    for(const [label,val,field] of required){
      if(isBlank(val)){
        const el = row?.querySelector(`[data-field="${field}"]`);
        markAndScrollInvalid(el);
        return `見積条件${i+1}行目の${label}を入力してください`;
      }
    }
  }
  return '';
}
function issueQuote(){
  state.bottomNote = document.getElementById('bottomNote').value;
  const error = validateIssueQuote();
  if(error) return toast(error);
  toast('見積書発行は準備中です');
}

function addSupplier(){
  state.suppliers.push({id:uid(), shortName:'', formalName:'', contact:'', phone:'', yards:[{id:uid(), name:'', drayage:''}]});
  renderAll();
}
function removeSupplier(id){ state.suppliers = state.suppliers.filter(x => x.id !== id); renderAll(); }
function updateSupplier(id,key,val){ state.suppliers = state.suppliers.map(s => s.id===id ? {...s,[key]:val} : s); }
function addYard(sid){ state.suppliers = state.suppliers.map(s => s.id===sid ? {...s,yards:[...s.yards,{id:uid(),name:'',drayage:''}]} : s); renderAll(); }
function updateYard(sid,yid,key,val,el){ const nextVal = key==='drayage' ? parseNumericInput(val) : val; state.suppliers = state.suppliers.map(s => s.id===sid ? {...s,yards:s.yards.map(y => y.id===yid ? {...y,[key]:nextVal} : y)} : s); if(el){ el.classList.toggle('blank', !String(nextVal ?? '').trim()); } }
function removeYard(sid,yid){ state.suppliers = state.suppliers.map(s => s.id===sid ? {...s,yards:s.yards.filter(y => y.id!==yid)} : s); renderAll(); }

function addOceanFreight(){ state.oceanFreight.push({id:uid(), loadingPort:'', dischargePort:'', ofValue:'', ofCurrency:'', ebs:'', carrier:'', note:''}); renderAll(); }
function updateOceanFreight(id,key,val,el){ const numericKeys = ['ofValue','ebs']; const nextVal = numericKeys.includes(key) ? parseNumericInput(val) : val; state.oceanFreight = state.oceanFreight.map(r => r.id===id ? {...r,[key]:nextVal} : r); if(el){ el.classList.toggle('blank', !String(nextVal ?? '').trim()); } }
function removeOceanFreight(id){ state.oceanFreight = state.oceanFreight.filter(x => x.id !== id); renderAll(); }


function syncHeaderOffset(){
  const header = document.querySelector('.header');
  const wrap = document.querySelector('.wrap');
  if(!header || !wrap) return;
  const offset = Math.ceil(header.getBoundingClientRect().height) + 12;
  document.body.style.paddingTop = offset + 'px';
  wrap.style.paddingTop = '12px';
}
window.addEventListener('resize', syncHeaderOffset);

window.addEventListener('click', e => {
  if(e.target.id === 'savedModal') closeSavedModal();
});
document.getElementById('bottomNote').addEventListener('input', e => { state.bottomNote = e.target.value; e.target.classList.toggle('blank', !e.target.value.trim()); });

syncHeaderOffset();
renderAll();
setCalcMode('overseas');
syncHeaderOffset();
</script>
